<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>אישור הגעה - בנימין שמואל</title>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Arimo:wght@700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    * { 
        box-sizing: border-box; 
    }
    
    body { 
        margin: 0; 
        padding: 0; 
        /* רקע פחם יוקרתי ונקי ללא טקסטורות בעייתיות */
        background-color: #1e1d1c;
        background-image: radial-gradient(circle at center, #2c2a29 0%, #121111 100%);
        display: flex; 
        justify-content: center; 
        align-items: center; 
        min-height: 100dvh; 
        width: 100%;
        font-family: 'Assistant', sans-serif;
        overflow-x: hidden;
    }

    /* מעטפת המבטיחה מרכוז מושלם בכל מכשיר ומונעת גלילה מיותרת */
    .form-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        padding: 20px 15px;
        z-index: 10;
    }

    .form-card { 
        position: relative; 
        background-color: #e2e1dd; /* צבע הכרטיס השמאלי מההזמנה */
        border-radius: 16px; 
        padding: 30px 20px; 
        width: 100%; 
        max-width: 420px; 
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); 
        text-align: center; 
        border: 1px solid #c5c3bf;
    }

    /* מסגרת זהב פנימית כפולה ואלגנטית */
    .form-card::after {
        content: '';
        position: absolute;
        top: 10px;
        bottom: 10px;
        left: 10px;
        right: 10px;
        border: 1px solid rgba(140, 120, 83, 0.25);
        border-radius: 10px;
        pointer-events: none;
        z-index: 1;
    }

    .form-content {
        position: relative;
        z-index: 2;
    }

    h1 { 
        font-family: 'Assistant', sans-serif; 
        font-weight: 700;
        color: #262524; 
        font-size: 28px; 
        margin: 0 0 8px 0; 
    }
    
    .subtitle { 
        color: #8c7853; /* זהב/ברונזה עמוק מההזמנה */
        font-size: 16px; 
        font-weight: 600; 
        margin-bottom: 25px; 
        font-family: 'Amiri', serif;
    }
    
    .name-input, .note-input { 
        width: 100%; 
        padding: 12px; 
        border-radius: 8px; 
        border: 1px solid #cbd5e1; 
        background-color: #ffffff;
        margin-bottom: 15px; 
        font-size: 16px; 
        text-align: center; 
        font-family: inherit; 
        color: #262524;
    }
    .name-input:focus, .note-input:focus {
        outline: none;
        border-color: #8c7853;
        box-shadow: 0 0 5px rgba(140, 120, 83, 0.3);
    }
    
    .note-input { 
        height: 80px; 
        resize: none; 
        text-align: right; 
    }
    
    .rsvp-toggle { 
        display: flex; 
        justify-content: center; 
        gap: 10px; 
        margin-bottom: 20px; 
    }
    
    .toggle-btn { 
        flex: 1; 
        padding: 12px 10px; 
        border-radius: 8px; 
        border: 1px solid #cbd5e1; 
        background: white; 
        cursor: pointer; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        font-family: inherit;
        font-weight: 600;
        font-size: 15px;
        color: #55524d;
        transition: all 0.2s ease;
    }
    .toggle-btn i {
        font-size: 16px;
        margin-bottom: 4px;
    }
    
    /* עיצוב כפתורים פעילים על בסיס צבעי ההזמנה */
    .toggle-btn.active-yes { 
        background-color: #2c2a29; /* פחם כהה */
        color: #d8b87c; /* טקסט מוזהב */
        border-color: #2c2a29; 
    }
    .toggle-btn.active-no { 
        background-color: #723434; /* בורדו-חום אלגנטי */
        color: #ffffff; 
        border-color: #723434; 
    }
    
    .details-section { 
        display: none; 
        margin-bottom: 20px; 
    }
    
    .counter-section { 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        margin-bottom: 15px; 
    }
    
    .control-btn { 
        width: 36px; 
        height: 36px; 
        border-radius: 50%; 
        border: 1.5px solid #8c7853; 
        background: white; 
        color: #8c7853; 
        cursor: pointer; 
        font-size: 18px; 
        font-weight: bold; 
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .counter-value { 
        font-size: 22px; 
        font-weight: 700; 
        color: #262524; 
        margin: 0 15px; 
    }
    
    .submit-btn { 
        background: linear-gradient(135deg, #2c2a29 0%, #1e1d1c 100%); 
        color: #d8b87c; 
        border: 1px solid #8c7853; 
        padding: 12px; 
        font-weight: 700; 
        font-size: 16px;
        border-radius: 50px; 
        cursor: pointer; 
        width: 100%; 
        display: none; 
        margin-top: 10px; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.25);
    }
</style>
</head>
<body>

<div class="form-wrapper">
    <form id="realRsvpForm"
          action="https://docs.google.com/forms/d/e/1FAIpQLSf__RAqcS81CkBbmSEH6TqslCMG3OxURhXNhUbhwfhYPHo-aQ/formResponse"
          method="POST"
          target="hidden_iframe"
          onsubmit="submitted=true;">
        <input type="hidden" name="entry.1433589886" id="gName">
        <input type="hidden" name="entry.1597149823" id="gGuests">
        <input type="hidden" name="entry.1580638204" id="gNotes">

        <div class="form-card">
            <div class="form-content">
                <h1>אישור הגעה</h1>
                <div class="subtitle">נשמח לראותכם בין אורחינו בבר המצווה</div>
                
                <input type="text" id="guestName" class="name-input" placeholder="שם מלא" required autocomplete="off">

                <div class="rsvp-toggle">
                    <button type="button" class="toggle-btn" id="btnYes" onclick="toggleSelection('yes')">
                        <i class="fa-solid fa-check"></i> <span>נגיע!</span>
                    </button>
                    <button type="button" class="toggle-btn" id="btnNo" onclick="toggleSelection('no')">
                        <i class="fa-solid fa-xmark"></i> <span>לא נגיע</span>
                    </button>
                </div>

                <div id="detailsSection" class="details-section">
                    <div class="counter-section">
                        <span style="margin-bottom: 8px; font-weight: bold; color: #444;">כמה אתם?</span>
                        <div style="display: flex; align-items: center;">
                            <button type="button" class="control-btn" onclick="updateCount(-1)">-</button>
                            <span class="counter-value" id="guestCount">1</span>
                            <button type="button" class="control-btn" onclick="updateCount(1)">+</button>
                        </div>
                    </div>
                    <textarea id="guestNotes" class="note-input" placeholder="הערות מיוחדות..."></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">שמירה</button>
            </div>
        </div>
    </form>
</div>

<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="handleResponse()"></iframe>

<script>
    var submitted = false;
    let count = 1;
    let isAttending = null;

    function toggleSelection(type) {
        isAttending = (type === 'yes');
        document.getElementById('btnYes').className = isAttending ? 'toggle-btn active-yes' : 'toggle-btn';
        document.getElementById('btnNo').className = !isAttending ? 'toggle-btn active-no' : 'toggle-btn';
        document.getElementById('detailsSection').style.display = isAttending ? 'block' : 'none';
        document.getElementById('submitBtn').style.display = 'block';
    }

    function updateCount(val) {
        count = Math.max(1, count + val);
        document.getElementById('guestCount').innerText = count;
    }

    function handleResponse() {
        if (submitted) {
            if (isAttending) {
                window.location.href = 'https://yispo.github.io/uriel-bar-mitzvah/thanks.html';
            } else {
                window.location.href = 'https://yispo.github.io/uriel-bar-mitzvah/thanks-no.html';
            }
        }
    }

    document.getElementById('realRsvpForm').addEventListener('submit', function(e) {
        document.getElementById('gName').value = document.getElementById('guestName').value;
        document.getElementById('gGuests').value = isAttending ? count : 0;
        document.getElementById('gNotes').value = document.getElementById('guestNotes').value;
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>תודה על העדכון</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Arimo:wght@700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { 
            box-sizing: border-box; 
        }
        
        body { 
            margin: 0; 
            padding: 0; 
            background: radial-gradient(circle at center, #2c2a29 0%, #171615 100%);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100dvh; 
            width: 100vw;
            font-family: 'Assistant', sans-serif;
            overflow-x: hidden;
        }

        .form-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px 15px;
            z-index: 10;
        }

        .form-card { 
            position: relative; 
            background: #e2e1dd;
            border-radius: 16px; 
            padding: 40px 30px; 
            width: 100%; 
            max-width: 440px; 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5); 
            text-align: center; 
            border: 1px solid #c5c3bf;
            transition: all 0.3s ease;
        }

        .form-card::after {
            content: '';
            position: absolute;
            top: 12px;
            bottom: 12px;
            left: 12px;
            right: 12px;
            border: 1px solid rgba(111, 107, 100, 0.25);
            border-radius: 12px;
            pointer-events: none;
            z-index: 1;
        }

        .form-content {
            position: relative;
            z-index: 2;
        }

        .bsd {
            font-size: 13px;
            color: #8c7853;
            letter-spacing: 1px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        h1 { 
            font-family: 'Assistant', sans-serif; 
            font-weight: 700;
            color: #262524; 
            font-size: 32px; 
            margin: 0 0 8px 0; 
            line-height: 1.2;
        }
        
        .subtitle { 
            color: #8c7853; 
            font-size: 18px; 
            font-weight: 600; 
            margin-bottom: 25px; 
            font-family: 'Amiri', serif;
        }

        p { 
            color: #4a4844; 
            font-size: 16px; 
            line-height: 1.6; 
            margin: 10px 0 25px 0; 
        }
        
        .calendar-btn { 
            display: inline-flex; 
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #2c2a29 0%, #1e1d1c 100%); 
            color: #d8b87c !important; 
            border: 1px solid #8c7853; 
            padding: 14px 28px; 
            font-weight: 700; 
            font-size: 15px;
            text-decoration: none;
            border-radius: 50px; 
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-family: inherit;
            margin-bottom: 30px;
            width: auto;
        }
        
        .calendar-btn:hover {
            background: linear-gradient(135deg, #3d3b39 0%, #2c2a29 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .signature {
            font-size: 19px;
            color: #262524;
            font-family: 'Amiri', serif;
            font-weight: 700;
            border-top: 1px dashed rgba(140, 120, 83, 0.3);
            padding-top: 15px;
            display: inline-block;
            width: 80%;
            margin-top: 15px;
        }

        .icon {
            font-size: 24px;
            color: #8c7853;
            margin-bottom: 10px;
        }

        /* התאמה רספונסיבית מעולה למובייל ולמסכים קטנים */
        @media (max-width: 480px) {
            .form-wrapper {
                padding: 10px;
            }

            .form-card {
                padding: 30px 20px;
                border-radius: 12px;
            }
            
            .form-card::after {
                top: 8px;
                bottom: 8px;
                left: 8px;
                right: 8px;
                border-radius: 8px;
            }

            h1 {
                font-size: 26px;
                margin-bottom: 6px;
            }

            .subtitle {
                font-size: 16px;
                margin-bottom: 20px;
            }

            p {
                font-size: 15px;
                margin: 10px 0 20px 0;
            }

            .calendar-btn {
                padding: 14px 20px;
                font-size: 15px;
                width: 100%; /* כפתור רחב ונוח ללחיצה באגודל בנייד */
                box-sizing: border-box;
            }
            
            .signature {
                font-size: 17px;
                width: 90%;
            }
        }
    </style>
</head>
<body>

<div class="form-wrapper">
    <div class="form-card">
        <div class="form-content">
            <div class="bsd">בס"ד</div>
            
            <div class="icon">
                <i class="fa-solid fa-circle-check"></i>
            </div>

            <h1>תודה על העדכון</h1>
            <div class="subtitle">אישורכם התקבל בהצלחה!</div>
            
            <p>
                שמחים ומצפים לראותכם בחגיגת בר המצווה<br>של בנימין שמואל היקר
            </p>
            
            <!-- כפתור שמירה ביומן מתוקן במלואו -->
            <a href="https://www.google.com/calendar/render?action=TEMPLATE&text=%D7%91%D7%A8+%D7%9E%D7%A6%D7%95%D7%95%D7%94+%D7%A9%D7%9C+%D7%91%D7%A0%D7%99%D7%9E%D7%99%D7%9F+%D7%A9%D7%9E%D7%95%D7%90%D7%9C+%D7%92%D7%A0%D7%A5&dates=20260809T190000/20260809T220000&details=%D7%90%D7%95%D7%9C%D7%9D%3A+%D7%9E%D7%A9%D7%9B%D7%9F+%D7%94%D7%9B%D7%99%D7%A0%D7%95%D7%A1%D7%99%D7%9D+%28%D7%97%D7%91%D7%A8%D7%95%D7%9F%29&location=%D7%A8%D7%91%D7%9F+%D7%99%D7%95%D7%97%D7%A0%D7%9F+%D7%91%D7%9F+%D7%96%D7%9B%D7%90%D7%99+79%2C+%D7%90%D7%9C%D7%A2%D7%93" target="_blank" class="calendar-btn">
                <i class="fa-regular fa-calendar-plus"></i> שמירה ביומן גוגל
            </a>
            
            <br>
            <div class="signature">משפחת גנץ</div>
        </div>
    </div>
</div>

</body>
</html>

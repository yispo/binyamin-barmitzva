<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>נתגעגע</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Arimo:wght@700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { 
            box-sizing: border-box; 
        }
        
        body { 
            margin: 0; 
            padding: 0; 
            background: radial-gradient(circle at center, #2c2a29 0%, #171615 100%);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100dvh; 
            width: 100%;
            font-family: 'Assistant', sans-serif;
            overflow-x: hidden;
        }

        .form-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px 15px;
            z-index: 10;
        }

        .form-card { 
            position: relative; 
            background: #e2e1dd;
            border-radius: 16px; 
            padding: 40px 30px; 
            width: 100%; 
            max-width: 440px; 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5); 
            text-align: center; 
            border: 1px solid #c5c3bf;
            transition: all 0.3s ease;
        }

        /* מסגרת פנימית כפולה קלאסית מעודנת */
        .form-card::after {
            content: '';
            position: absolute;
            top: 12px;
            bottom: 12px;
            left: 12px;
            right: 12px;
            border: 1px solid rgba(111, 107, 100, 0.25);
            border-radius: 12px;
            pointer-events: none;
            z-index: 1;
        }

        .form-content {
            position: relative;
            z-index: 2;
        }

        h1 { 
            font-family: 'Assistant', sans-serif; 
            font-weight: 700;
            color: #262524; 
            font-size: 32px; 
            margin: 0 0 12px 0; 
            line-height: 1.2;
        }
        
        .subtitle { 
            color: #8c7853; 
            font-size: 18px; 
            font-weight: 600; 
            margin-bottom: 25px; 
            font-family: 'Amiri', serif;
        }

        p { 
            color: #4a4844; 
            font-size: 16px; 
            line-height: 1.6; 
            margin: 10px 0 30px 0; 
        }
        
        .back-btn { 
            display: inline-block; 
            background: linear-gradient(135deg, #2c2a29 0%, #1e1d1c 100%); 
            color: #d8b87c; 
            border: 1px solid #8c7853; 
            padding: 14px 30px; 
            font-weight: 700; 
            font-size: 16px;
            text-decoration: none;
            border-radius: 50px; 
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-family: inherit;
            width: auto;
        }
        
        .back-btn:hover {
            background: linear-gradient(135deg, #3d3b39 0%, #2c2a29 100%);
            transform: translateY(-1px);
        }

        /* התאמות מיוחדות למסכים קטנים ומובייל (Responsive Rules) */
        @media (max-width: 480px) {
            .form-card {
                padding: 30px 20px; /* הקטנת הריווח הפנימי כדי למנוע צפיפות */
            }
            
            .form-card::after {
                top: 8px;
                bottom: 8px;
                left: 8px;
                right: 8px;
            }

            h1 {
                font-size: 26px; /* הקטנת גודל כותרת במובייל */
                margin-bottom: 8px;
            }

            .subtitle {
                font-size: 16px;
                margin-bottom: 20px;
            }

            p {
                font-size: 15px;
                margin: 10px 0 25px 0;
            }

            .back-btn {
                padding: 12px 24px;
                font-size: 15px;
                width: 100%; /* פריסה מלאה של הכפתור לנוחות לחיצה במובייל */
            }
        }
    </style>
</head>
<body>

<div class="form-wrapper">
    <div class="form-card">
        <div class="form-content">
            <h1>תודה על העדכון</h1>
            <div class="subtitle">נתגעגע אליכם!</div>
            
            <p>
                מצטערים שלא תוכלו להשתתף בבר המצווה של בנימין שמואל.<br>
                נשמח לחגוג יחד בשמחות הבאות!
            </p>
            
    <a href="index.html" class="back-btn">
    <i class="fa-solid fa-house" style="margin-left: 6px;"></i> חזרה לדף הבית
            </a>
        </div>
    </div>
</div>

</body>
</html>
